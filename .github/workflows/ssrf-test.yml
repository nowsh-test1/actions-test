name: SSRF Metadata Test
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe cloud metadata endpoints
        run: |
          echo "=== Network Info ==="
          hostname
          ip addr show 2>/dev/null || ifconfig 2>/dev/null
          echo ""
          echo "=== AWS IMDSv1 ==="
          curl -s --connect-timeout 3 --max-time 5 http://169.254.169.254/latest/meta-data/ 2>&1 || echo "UNREACHABLE"
          echo ""
          echo "=== AWS IMDSv2 Token ==="
          TOKEN=$(curl -s --connect-timeout 3 --max-time 5 -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600" 2>&1) || echo "UNREACHABLE"
          echo "Token response: $TOKEN"
          if [ -n "$TOKEN" ] && [ "$TOKEN" != "UNREACHABLE" ]; then
            echo "=== AWS IMDSv2 with token ==="
            curl -s --connect-timeout 3 -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/ 2>&1 || echo "FAILED"
          fi
          echo ""
          echo "=== GCP Metadata ==="
          curl -s --connect-timeout 3 --max-time 5 -H "Metadata-Flavor: Google" http://metadata.google.internal/computeMetadata/v1/ 2>&1 || echo "UNREACHABLE"
          echo ""
          echo "=== Azure Metadata ==="
          curl -s --connect-timeout 3 --max-time 5 -H "Metadata: true" "http://169.254.169.254/metadata/instance?api-version=2021-02-01" 2>&1 || echo "UNREACHABLE"
          echo ""
          echo "=== ECS Credentials ==="
          curl -s --connect-timeout 3 --max-time 5 http://169.254.170.2/v2/credentials 2>&1 || echo "UNREACHABLE"
          echo ""
          echo "=== Kubernetes ==="
          curl -s --connect-timeout 3 --max-time 5 -k https://kubernetes.default.svc/api/ 2>&1 || echo "UNREACHABLE"
          echo ""
          echo "=== Actions Runtime Token ==="
          echo "ACTIONS_RUNTIME_TOKEN=${ACTIONS_RUNTIME_TOKEN:0:20}..."
          echo "ACTIONS_RUNTIME_URL=$ACTIONS_RUNTIME_URL"
          echo ""
          echo "=== Internal DNS ==="
          nslookup metadata.google.internal 2>&1 || echo "DNS failed"
          nslookup kubernetes.default.svc 2>&1 || echo "DNS failed"
          echo ""
          echo "=== Routes ==="
          ip route show 2>/dev/null || route -n 2>/dev/null
          echo ""
          echo "=== Link-local route ==="
          ip route get 169.254.169.254 2>/dev/null || echo "No route to link-local"
