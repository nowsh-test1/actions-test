name: OIDC Test
on:
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  oidc:
    runs-on: ubuntu-latest
    steps:
      - name: Request OIDC tokens
        run: |
          echo "URL: $ACTIONS_ID_TOKEN_REQUEST_URL"
          echo "TOKEN_LEN: ${#ACTIONS_ID_TOKEN_REQUEST_TOKEN}"
          if [ -z "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            echo "NO OIDC URL"
            exit 0
          fi
          for aud in "api://AzureADTokenExchange" "https://github.com" "sts.amazonaws.com"; do
            echo "--- Audience: $aud ---"
            RESP=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$aud")
            echo "$RESP" | head -2
            TOKEN=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('value',''))" 2>/dev/null)
            if [ -n "$TOKEN" ]; then
              echo "JWT:"
              echo "$TOKEN" | cut -d. -f2 | python3 -c "import sys,base64,json;b=sys.stdin.read().strip();b+='='*(4-len(b)%4);[print(k,v) for k,v in json.loads(base64.b64decode(b)).items()]" 2>/dev/null
            fi
            echo ""
          done
